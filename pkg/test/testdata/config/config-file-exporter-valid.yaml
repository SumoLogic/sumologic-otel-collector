receivers:
  filelog:
    include:
      - ./testdata/logs/test
    start_at: beginning

exporters:
  file:
    path: ./output/test.log
    sending_queue:
      enabled: true
      queue_size: 25600000
      batch:
        flush_timeout: 1s
        min_size: 1024
        max_size: 2048
    rotation:
      max_megabytes: 10
      max_days: 3
      max_backups: 3

service:
  pipelines:
    logs:
      receivers: [filelog]
      exporters: [file]
