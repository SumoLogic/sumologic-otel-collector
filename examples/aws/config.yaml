extensions:
  health_check:
receivers:
  otlp:
    protocols:
      grpc:
        endpoint:
      http:
        endpoint:
processors:
  memory_limiter:
      check_interval: 1s
      limit_percentage: 80
      spike_limit_percentage: 20
  resourcedetection:
    detectors: [env, ec2, ecs]
    timeout: 5s
    override: true
exporters:
  otlphttp:
    endpoint: SUMO_OTLP_HTTP_ENDPOINT_URL
service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection]
      exporters: [otlphttp]
