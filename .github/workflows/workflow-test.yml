name: Run tests

on:
  workflow_call:
    inputs:
      arch_os:
        description: Architecture and OS in the form "{arch}_{os}". See GOARCH and GOOS for accepted values.
        default: linux_amd64
        type: string
      boringcrypto:
        description: Run with BoringCrypto enabled
        default: false
        type: boolean
      go-version:
        description: The version of Go to use.
        type: string
        required: true
      only-if-changed:
        description: Run only if relevant files changed.
        default: false
        type: boolean
      runs-on:
        default: ubuntu-24.04
        type: string

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runs-on }}
    env:
      BORINGCRYPTO_SUFFIX: ${{ inputs.boringcrypto && '-boringcrypto' || '' }}
    steps:
      - uses: actions/checkout@v4

      # Run make with support for parallel jobs matching the number of cores
      # available on each GitHub Runner. The core count can be found at the
      # following URL.
      # https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
      - name: Set MAKEFLAGS
        run: |
          cores="4"
          if [[ "${RUNNER_OS}" == "macOS" && "${RUNNER_ARCH}" == "ARM64" ]]; then
            cores="3"
          fi

          echo "MAKEFLAGS=-j ${cores}" >> $GITHUB_ENV

      - name: Setup Go
        id: setup-go
        uses: ./.github/actions/setup-go
        with:
          version: ${{ inputs.go-version }}
          cache-dependency-paths: |
            **/*.sum
            otelcolbuilder/.otelcol-builder.yaml

      - name: Setup yq
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-yq

      - name: Setup ocb
        uses: ./.github/actions/setup-ocb

      - name: Install Go JUnit Report
        run: make install-go-junit-report

      - name: Run package tests
        run: make gotest-junit ${{ inputs.boringcrypto && 'CGO_ENABLED=1 GOEXPERIMENT=boringcrypto' || '' }}

      - name: Print JUnit Reports
        run: |
          find . -name report.xml -exec cat {} \;

      - name: Test Summary
        uses: test-summary/action@v1
        with:
          paths: |
            **/report.xml
        if: always()
