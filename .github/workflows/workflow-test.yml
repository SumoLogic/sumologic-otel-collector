name: Run tests

on:
  workflow_call:
    inputs:
      arch_os:
        description: Architecture and OS in the form "{arch}_{os}". See GOARCH and GOOS for accepted values.
        default: linux_amd64
        type: string
      boringcrypto:
        description: Run with BoringCrypto enabled
        default: false
        type: boolean
      go-version:
        description: The version of Go to use.
        type: string
        required: true
      runs-on:
        default: ubuntu-24.04
        type: string
      only-if-changed:
        description: Run only if relevant files changed.
        default: false
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runs-on }}
    env:
      BORINGCRYPTO_SUFFIX: ${{ inputs.boringcrypto && '-boringcrypto' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: ./.github/actions/setup-go
        with:
          version: ${{ inputs.go-version }}
          cache-dependency-paths: |
            **/*.sum
            otelcolbuilder/.otelcol-builder.yaml

      - name: Show cache sizes
        run: |
          du -hs $(go env GOPATH)/bin
          du -hs $(go env GOMODCACHE)
          du -hs $(go env GOCACHE)

      - name: Setup yq
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-yq

      - name: Setup ocb
        uses: ./.github/actions/setup-ocb

      - name: Run package tests
        run: make gotest ${{ inputs.boringcrypto && 'CGO_ENABLED=1 GOEXPERIMENT=boringcrypto' || '' }}
