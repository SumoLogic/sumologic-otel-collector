name: Auto-update Renovate PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: read

jobs:
  update-renovate-pr:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-24.04

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 2

      - name: Skip if last commit is already from this workflow
        id: check-skip
        run: |
          LAST_AUTHOR=$(git log -1 --format='%an')
          if [[ "$LAST_AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit already from github-actions[bot]"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.check-skip.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Run renovate.sh (doc updates + changelog)
        if: steps.check-skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          chmod +x .github/renovate.sh
          .github/renovate.sh

      - name: Commit and push changes
        if: steps.check-skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: update docs and changelog after dependency upgrade"
          git push origin "${{ github.head_ref }}"
