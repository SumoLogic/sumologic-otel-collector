name: Add Changelog Entry for Renovate PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: read

jobs:
  add-changelog:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-24.04

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 2

      - name: Skip if last commit is already from this workflow
        id: check-skip
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if [[ "$LAST_MSG" == "docs: update docs and changelog after dependency upgrade" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit is already from this workflow"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.check-skip.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "oldstable"

      - name: Run renovate.sh (doc updates)
        if: steps.check-skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          chmod +x .github/renovate.sh
          .github/renovate.sh

      - name: Create changelog entry
        if: steps.check-skip.outputs.skip != 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          mkdir -p .changelog

          # Skip if any changelog fragment already exists for this PR
          if ls .changelog/${PR_NUMBER}.*.txt 1>/dev/null 2>&1; then
            echo "Changelog entry already exists for PR #${PR_NUMBER}, skipping"
          else
            CHANGELOG_FILE=".changelog/${PR_NUMBER}.changed.txt"
            echo "$PR_TITLE" > "$CHANGELOG_FILE"
            echo "Created changelog file: $CHANGELOG_FILE with content: $PR_TITLE"
          fi

      - name: Commit and push changes
        if: steps.check-skip.outputs.skip != 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "renovatebot-sumologic[bot]"
          git config user.email "279692411+renovatebot-sumologic[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: update docs and changelog after dependency upgrade"
          git push origin "$HEAD_REF"
