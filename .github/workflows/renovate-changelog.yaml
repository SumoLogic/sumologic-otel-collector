name: Auto-update Renovate PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: read

jobs:
  update-renovate-pr:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-24.04

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 2

      - name: Skip if last commit is already from this workflow
        id: check-skip
        run: |
          LAST_AUTHOR=$(git log -1 --format='%an')
          if [[ "$LAST_AUTHOR" == "renovatebot-sumologic[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit already from renovatebot-sumologic[bot]"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.check-skip.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "oldstable"

      - name: Run renovate.sh (doc updates + changelog)
        if: steps.check-skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x .github/renovate.sh
          .github/renovate.sh

      - name: Ensure changelog entry exists
        if: steps.check-skip.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGELOG_FILE=".changelog/${PR_NUMBER}.changed.txt"
          if [[ ! -e "$CHANGELOG_FILE" ]]; then
            TO_VER=$(grep -o 'github.com/open-telemetry/opentelemetry-collector-contrib[^ ]* v[0-9.]\+' \
              pkg/extension/opampextension/go.mod | awk '{print $2}' | sed 's/^v//' | sort -u | head -1)
            echo "chore: upgrade core and contrib to ${TO_VER}" > "$CHANGELOG_FILE"
            echo "Created changelog entry: $CHANGELOG_FILE"
          else
            echo "Changelog entry already exists: $CHANGELOG_FILE"
          fi

      - name: Commit and push changes
        if: steps.check-skip.outputs.skip != 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "renovatebot-sumologic[bot]"
          git config user.email "279692411+renovatebot-sumologic[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: update docs and changelog after dependency upgrade"
          git push origin "$HEAD_REF"
