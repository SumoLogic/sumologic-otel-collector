  push-docker-manifest:
    name: Push joint container manifest
    runs-on: ubuntu-24.04
    needs:
      - build-container-images
      #- build-windows-container-images
      - get-version
    strategy:
      matrix:
        include:
          - target: standard
            tags: '["latest", "${{ github.sha }}"]'
          - target: standard-fips
            tags: '["latest-fips", "${{ github.sha }}-fips"]'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Show Buildx platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Login to Private Open Source ECR
        run: make login-ecr-private
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}

      - name: Determine source images
        run: |
          echo '${{ toJSON(needs.build-container-images.outputs) }}' \
          | jq -jf ci/jq/manifest-sources.jq --arg target ${{ matrix.target }} \
          > sources.txt

          cat sources.txt

      - name: Determine tags
        env:
          REPO_BASE: 663229565520.dkr.ecr.us-east-1.amazonaws.com
          REPO_ORG: sumologic
          REPO_NAME: sumologic-otel-collector-ci-build
        run: |
          REPO="${REPO_BASE}/${REPO_ORG}/${REPO_NAME}"
          echo '${{ matrix.tags }}' | jq -jf ci/jq/tags.jq --arg url "$REPO" > tags.txt

      - name: Create multiplatform image index
        run: |
          docker buildx imagetools create $(cat sources.txt) $(cat tags.txt)

