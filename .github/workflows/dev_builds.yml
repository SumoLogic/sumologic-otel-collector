  build-container-images:
    name: Build container
    runs-on: ubuntu-24.04
    needs:
      - build
      - get-version
    outputs:
      # NOTE: one output is needed for each item in the matrix. These outputs
      # store the raw manifest of the container image of each build and are used
      # to create a multiplatform image index later on.
      manifest_standard_linux_amd64: ${{ steps.manifest.outputs.standard_linux_amd64 }}
      manifest_standard_linux_arm64: ${{ steps.manifest.outputs.standard_linux_arm64 }}
      manifest_standard-fips_linux_amd64: ${{ steps.manifest.outputs.standard-fips_linux_amd64 }}
      manifest_standard-fips_linux_arm64: ${{ steps.manifest.outputs.standard-fips_linux_arm64 }}
    strategy:
      matrix:
        include:
          - target: standard
            platform: linux_amd64
            collector_binary: otelcol-sumo
          - target: standard
            platform: linux_arm64
            collector_binary: otelcol-sumo
          - target: standard-fips
            platform: linux_amd64
            collector_binary: otelcol-sumo-fips
          - target: standard-fips
            platform: linux_arm64
            collector_binary: otelcol-sumo-fips
    steps:
      - uses: actions/checkout@v4

      - name: Convert Go platform to Docker platform
        id: docker-platform
        run: |
          platform=${{ matrix.platform }}
          echo "name=${platform/_/\/}" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: 663229565520.dkr.ecr.us-east-1.amazonaws.com/sumologic/sumologic-otel-collector-ci-builds
          # tags: ${{ inputs.meta-tags }}
          # flavor: ${{ inputs.meta-flavor }}
          # labels: ${{ inputs.meta-labels }}
          # annotations: ${{ inputs.meta-annotations }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Show Buildx platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Login to ECR
        uses: docker/login-action@v3
        with:
          registry: 663229565520.dkr.ecr.us-east-1.amazonaws.com
          username: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}

      - name: Download binary action artifact from build phase
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.collector_binary }}-${{ matrix.platform }}
          path: artifacts/${{ steps.docker-platform.outputs.name }}/${{ matrix.collector_binary }}

      - name: Set GIT_SHA
        run: echo "GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set BASE_TAG
        run: echo "BASE_TAG=663229565520.dkr.ecr.us-east-1.amazonaws.com/sumologic/sumologic-otel-collector-ci-builds" >> "$GITHUB_ENV"

      - name: Build and push
        id: build
        uses: docker/bake-action@v6
        with:
          source: .
          targets: ${{ matrix.target }}
          push: true
          set: |
            *.platform=${{ steps.docker-platform.outputs.name }}
            *.tags=
            *.output=type=image,"name=663229565520.dkr.ecr.us-east-1.amazonaws.com/sumologic/sumologic-otel-collector-ci-builds",push-by-digest=true,name-canonical=true,push=true

      - name: Print metadata
        run: echo '${{ steps.build.outputs.metadata }}'

      - name: Set container image manifest output
        id: manifest
        run: |
          name="${{ matrix.target }}_${{ matrix.platform }}"
          printf -v metadata $(echo '${{ steps.build.outputs.metadata }}' | jq -c .)
          echo "${name}=${metadata}" >> "$GITHUB_OUTPUT"

