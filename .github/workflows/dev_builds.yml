name: Dev builds

on:
  push:
    branches:
      - main
      - "dev-build/*"

defaults:
  run:
    shell: bash

env:
  GO_VERSION: "1.23.0"

jobs:
  # Add lint to dev builds as that's the only way for cache to be shared across branches.
  # https://docs.github.com/en/actions/advanced-guides/caching-dependencies-to-speed-up-workflows#matching-a-cache-key
  lint:
    name: Lint (staticcheck)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch_os: ["linux_amd64"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Get GOCACHE and GOMODCACHE
        run: |
          echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_ENV"
          echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"

      - uses: actions/cache/restore@v4
        id: restore-go-mod-cache
        with:
          path: |
            ${{ env.GOMODCACHE }}/cache
            ${{ env.GOCACHE }}
          key: go-lint-${{ env.GO_VERSION }}-${{ matrix.arch_os }}-${{ hashFiles('pkg/**/*/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            go-lint-${{ env.GO_VERSION }}-${{ matrix.arch_os }}-

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/staticcheck
          key: staticcheck-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            staticcheck-${{ runner.os }}-

      - name: Install staticcheck
        run: make install-staticcheck

        # TODO: fix the Makefile so that it doesn't require this when running
        # targets that shouldn't require it (e.g. make golint)
      - name: Add opentelemetry-collector-builder installation dir to PATH
        run: echo "$HOME/bin" >> $GITHUB_PATH

      - name: Run staticcheck
        run: make golint

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ${{ env.GOMODCACHE }}/cache
            ${{ env.GOCACHE }}
          key: ${{ steps.restore-go-mod-cache.outputs.cache-primary-key }}

  test:
    name: Test
    uses: ./.github/workflows/workflow-test.yml
    strategy:
      matrix:
        include:
          - arch_os: linux_amd64
            runs-on: ubuntu-24.04
          # - arch_os: linux_amd64
          #   runs-on: ubuntu-24.04
          #   boringcrypto: true
          # - arch_os: darwin_amd64
          #   runs-on: macos-15
          # - arch_os: windows_amd64
          #   runs-on: windows-2022
    with:
      arch_os: ${{ matrix.arch_os }}
      runs-on: ${{ matrix.runs-on }}
      boringcrypto: ${{ matrix.boringcrypto == true }}

  test-otelcol-config:
    name: Test (otelcol-config)
    uses: ./.github/workflows/workflow-test-otelcol-config.yml
    strategy:
      matrix:
        include:
          - arch_os: linux_amd64
            runs-on: ubuntu-24.04
          # - arch_os: linux_amd64
          #   runs-on: ubuntu-24.04
          #   boringcrypto: true
          # - arch_os: darwin_amd64
          #   runs-on: macos-15
    with:
      arch_os: ${{ matrix.arch_os }}
      runs-on: ${{ matrix.runs-on }}
      boringcrypto: ${{ matrix.boringcrypto == true }}

  get-version:
    name: Get next available version
    uses: ./.github/workflows/_get-version-workflow.yml

  build:
    name: Build
    uses: ./.github/workflows/workflow-build.yml
    needs: [get-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_os: linux_amd64
            runs-on: ubuntu-24.04
          - arch_os: linux_amd64
            runs-on: ubuntu-24.04
            fips: true
          - arch_os: linux_arm64
            runs-on: ubuntu-24.04
          - arch_os: linux_arm64
            runs-on: ubuntu-24.04
            fips: true
          # - arch_os: darwin_amd64
