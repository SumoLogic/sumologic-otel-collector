name: Dev builds

on:
  push:
    branches:
      - main
      - "dev-build/*"

defaults:
  run:
    shell: bash

env:
  GO_VERSION: "1.24.0"

jobs:
  get-otc-version:
    name: Get next available OTC version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.otc-version.outputs.version }}
      version-with-sha: ${{ steps.otc-version.outputs.version-with-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next available OTC version
        id: otc-version
        uses: ./.github/actions/get-next-otc-version

  get-go-version:
    name: Get Go version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.go-version.outputs.version }}
    steps:
      - name: Output Go version
        id: go-version
        run: echo "version=${GO_VERSION}" >> $GITHUB_OUTPUT

      - name: Get Azure Region
        run: |
          curl -sH Metadata:true "http://169.254.169.254/metadata/instance?api-version=2017-12-01" | jq .

  setup-cache-otelcol:
    name: Setup Cache (otelcol)
    runs-on: ${{ matrix.runs-on }}
    needs: [get-go-version]
    strategy:
      matrix:
        include:
          - runs-on: macos-15
            distribution: official
          - runs-on: ubuntu-24.04
            distribution: official
          - runs-on: windows-2022
            distribution: official
          - runs-on: windows-2022
            distribution: microsoft
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: ./.github/actions/setup-go
        with:
          distribution: ${{ matrix.distribution }}
          skip-cache-restore-on-hit: "true"
          version: ${{ needs.get-go-version.outputs.version }}
          cache-dependency-paths: |
            **/*.sum
            otelcolbuilder/.otelcol-builder.yaml

      - uses: ./.github/actions/setup-make-environment
        if: steps.setup-go.outputs.cache-hit != 'true'

      - name: Install Go modules
        if: steps.setup-go.outputs.cache-hit != 'true'
        run: make gomod-download-all

      - name: Generate OTC sources & Install Go modules
        if: steps.setup-go.outputs.cache-hit != 'true'
        working-directory: otelcolbuilder
        run: make generate-sources

      # NOTE: There doesn't appear to be a simple way to run post hooks in
      # composite actions. We must unmount the VHDX image after we're done using
      # it but before the post-cache hook runs. We should be able to fix this by
      # converting our setup-vhdx action to NodeJS.
      - name: Unmount Go Cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Dismount-VHD -Path go-cache.vhdx

  setup-cache-otelcol-config:
    name: Setup Cache (otelcol-config)
    runs-on: ${{ matrix.runs-on }}
    needs: [get-go-version]
    strategy:
      matrix:
        include:
          - runs-on: macos-15
            distribution: official
          - runs-on: ubuntu-24.04
            distribution: official
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: ./.github/actions/setup-go
        with:
          distribution: ${{ matrix.distribution }}
          skip-cache-restore-on-hit: "true"
          version: ${{ needs.get-go-version.outputs.version }}
          cache-name: otelcol-config-go-cache
          cache-dependency-paths: |
            pkg/tools/otelcol-config/go.sum

      - uses: ./.github/actions/setup-make-environment
        if: steps.setup-go.outputs.cache-hit != 'true'

      - name: Install Go modules
        if: steps.setup-go.outputs.cache-hit != 'true'
        working-directory: ./pkg/tools/otelcol-config
        run: go mod download

  setup-cache-toolchain:
    name: Setup Cache (toolchain)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: linux_amd64
          - platform: linux_arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup MAKEFLAGS
        uses: ./.github/actions/setup-makeflags

      - name: Setup Toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          platform: ${{ matrix.platform }}
          skip-cache-restore-on-hit: "true"

  test:
    name: Test (otelcol)
    needs:
      - get-go-version
      - setup-cache-otelcol
    uses: ./.github/workflows/workflow-test.yml
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-24.04
          - runs-on: ubuntu-24.04
            fips: true
          - runs-on: macos-15
          - runs-on: windows-2025
    with:
      fips: ${{ matrix.fips == true }}
      go-version: ${{ needs.get-go-version.outputs.version }}
      runs-on: ${{ matrix.runs-on }}

  test-otelcol-config:
    name: Test (otelcol-config)
    uses: ./.github/workflows/workflow-test-otelcol-config.yml
    needs:
      - get-go-version
      - setup-cache-otelcol-config
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-24.04
          - runs-on: ubuntu-24.04
            fips: true
          - runs-on: macos-15
    with:
      runs-on: ${{ matrix.runs-on }}
      fips: ${{ matrix.fips == true }}
      go-version: ${{ needs.get-go-version.outputs.version }}

  build:
    name: Build (otelcol)
    uses: ./.github/workflows/workflow-build.yml
    needs:
      - get-otc-version
      - get-go-version
      - setup-cache-otelcol
      - setup-cache-toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux_amd64
            runs-on: ubuntu-24.04
          - platform: linux_amd64
            runs-on: ubuntu-24.04
            fips: true
          - platform: linux_arm64
            runs-on: ubuntu-24.04
          - platform: linux_arm64
            runs-on: ubuntu-24.04
            fips: true
          - platform: darwin_amd64
            runs-on: macos-15
          - platform: darwin_arm64
            runs-on: macos-15
          - platform: windows_amd64
            runs-on: windows-2022
          - platform: windows_amd64
            runs-on: windows-2022
            fips: true
    with:
      platform: ${{ matrix.platform }}
      runs-on: ${{ matrix.runs-on }}
      fips: ${{ matrix.fips == true }}
      go-version: ${{ needs.get-go-version.outputs.version }}
      version: ${{ needs.get-otc-version.outputs.version-with-sha }}
    secrets:
      apple_developer_certificate_p12_base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
      apple_developer_certificate_password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      app_store_connect_password: ${{ secrets.AC_PASSWORD }}
      microsoft_certificate: ${{ secrets.MICROSOFT_CERTIFICATE }}
      microsoft_certificate_password: ${{ secrets.MICROSOFT_CERTIFICATE_PASSWORD }}
      microsoft_certificate_hash: ${{ secrets.MICROSOFT_CERTHASH }}
      microsoft_certificate_name: ${{ secrets.MICROSOFT_CERTNAME }}
      microsoft_description: ${{ secrets.MICROSOFT_DESCRIPTION }}

  build-otelcol-config:
    name: Build (otelcol-config)
    uses: ./.github/workflows/workflow-build-otelcol-config.yml
    needs:
      - get-otc-version
      - get-go-version
      - setup-cache-otelcol-config
      - setup-cache-toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin_amd64
            runs-on: macos-15
          - platform: darwin_arm64
            runs-on: macos-15
          - platform: linux_amd64
            runs-on: ubuntu-24.04
          - platform: linux_amd64
            runs-on: ubuntu-24.04
            fips: true
          - platform: linux_arm64
            runs-on: ubuntu-24.04
          - platform: linux_arm64
            runs-on: ubuntu-24.04
            fips: true
    with:
      platform: ${{ matrix.platform }}
      runs-on: ${{ matrix.runs-on }}
      fips: ${{ matrix.fips == true }}
      go-version: ${{ needs.get-go-version.outputs.version }}
    secrets:
      apple_developer_certificate_p12_base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
      apple_developer_certificate_password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      app_store_connect_password: ${{ secrets.AC_PASSWORD }}

  build-container-images:
    name: Container Images
    uses: ./.github/workflows/workflow-build-container-images.yml
    needs:
      - build
      - get-otc-version
    strategy:
      matrix:
        include:
          # standard product
          - product: standard
            os: linux
            arch: amd64
          - product: standard
            os: linux
            arch: arm64
          - product: standard
            target: windows-ltsc2022
            os: windows
            os-version: 10.0.20348.3807
            arch: amd64
            runs-on: windows-2022
          - product: standard
            target: windows-ltsc2025
            os: windows
            os-version: 10.0.26100.4349
            arch: amd64
            runs-on: windows-2025
          # standard-fips product
          - product: standard-fips
            fips: true
            os: linux
            arch: amd64
          - product: standard-fips
            fips: true
            os: linux
            arch: arm64
          # ubi product
          - product: ubi
            os: linux
            arch: amd64
          - product: ubi
            os: linux
            arch: arm64
          # ubi-fips product
          - product: ubi-fips
            fips: true
            os: linux
            arch: amd64
          - product: ubi-fips
            fips: true
            os: linux
            arch: arm64
    with:
      arch: ${{ matrix.arch }}
      fips: ${{ matrix.fips == true }}
      os: ${{ matrix.os }}
      os-version: ${{ matrix.os-version }}
      product: ${{ matrix.product }}
      target: ${{ matrix.target }}
      runs-on: ${{ matrix.runs-on || 'ubuntu-24.04' }}
      version: ${{ needs.get-otc-version.outputs.version }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}

  push-container-indexes:
    name: Container Indexes
    uses: ./.github/workflows/workflow-push-container-indexes.yml
    needs:
      - build-container-images
      - get-otc-version
    strategy:
      matrix:
        include:
          - target: standard
            tags: '["latest", "${{ github.sha }}", "${{ needs.get-otc-version.outputs.version }}"]'
          - target: standard-fips
            tags: '["latest-fips", "${{ github.sha }}-fips", "${{ needs.get-otc-version.outputs.version }}-fips"]'
          - target: ubi
            tags: '["latest-ubi", "${{ github.sha }}-ubi", "${{ needs.get-otc-version.outputs.version }}-ubi"]'
          - target: ubi-fips
            tags: '["latest-ubi-fips", "${{ github.sha }}-ubi-fips", "${{ needs.get-otc-version.outputs.version }}-ubi-fips"]'
    with:
      tags: ${{ matrix.tags }}
      target: ${{ matrix.target }}
      version: ${{ needs.get-otc-version.outputs.version }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}

  # Store the install script from the packaging repository as an action artifact.
  # Originally, this script was stored in this repository, and the official download url pointed
  # to the most recent release here. The script has since been moved to the packaging repository.
  # It is kept here for backwards compatibility. Once the download count for this artifact
  # reaches 0 for new releases, this can be removed.
  #
  # TODO: This pulls the latest install scripts from the main branch of the
  # packaging reopsitory. There is a chance that the install scripts attached to
  # a collector release will differ from the install scripts attached to a
  # packaging release. We can either remove install scripts from releases here
  # or we should ensure that the install scripts are always automically synced
  # to this repository and use the install scripts from the HEAD SHA of the
  # collector workflow run specified for a release.
  install-script:
    name: Store install script
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: SumoLogic/sumologic-otel-collector-packaging

      - name: Store Linux install script as action artifact
        uses: actions/upload-artifact@v4
        with:
          name: install.sh
          path: ./install-script/install.sh
          if-no-files-found: error

      - name: Store Windows install script as action artifact
        uses: actions/upload-artifact@v4
        with:
          name: install.ps1
          path: ./install-script/install.ps1
          if-no-files-found: error

  config-management-assets:
    name: Store Chef cookbook, Puppet module, and Ansible playbook
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Archive Chef cookbook
        run: tar -cvf ./examples/chef/chef-cookbook.tar.gz -C ./examples/chef sumologic-otel-collector/

      - name: Archive Puppet module
        run: tar -cvf ./examples/puppet/puppet-module.tar.gz -C ./examples/puppet/modules install_otel_collector/

      - name: Archive Ansible playbook
        run: tar -cvf ./examples/ansible-playbook.tar.gz -C ./examples ansible/

      - name: Store Chef cookbook archive as action artifact
        uses: actions/upload-artifact@v4
        with:
          name: chef-cookbook.tar.gz
          path: ./examples/chef/chef-cookbook.tar.gz
          if-no-files-found: error

      - name: Store Puppet module archive as action artifact
        uses: actions/upload-artifact@v4
        with:
          name: puppet-module.tar.gz
          path: ./examples/puppet/puppet-module.tar.gz
          if-no-files-found: error

      - name: Store Ansible playbook archive as action artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-playbook.tar.gz
          path: ./examples/ansible-playbook.tar.gz
          if-no-files-found: error

  trigger-packaging:
    name: Trigger Packaging
    needs:
      - build
      - build-otelcol-config
    uses: ./.github/workflows/workflow-trigger-packaging.yml
    secrets: inherit
    with:
      workflow_id: ${{ github.run_id }}
