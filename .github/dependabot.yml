version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

    labels:
      - skip-changelog

  - package-ecosystem: "gomod"
    directories: "/pkg/**"
    schedule:
      interval: "daily"

    labels:
      - skip-changelog

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"

    labels:
      - skip-changelog
