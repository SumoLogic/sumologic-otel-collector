name: Setup Go

inputs:
  cache-prefix:
    description: ""
    required: false
  distribution:
    description: |
      The distribution of Go to install.
      Options:
        * official
        * microsoft
    required: false
    default: official
  skip-cache-restore-on-hit:
    description: |
      Skips restoring the cache when there is a cache hit for the primary cache
      key. Set to "true" to enable.
    required: false
  version:
    description: The version of Go to install.
    required: true

outputs:
  cache-hit:
    description: A boolean value to indicate an exact match was found for the primary key
    value: ${{ steps.go-cache.outputs.cache-hit }}
  go-arch:
    description: ""
    value: ${{ steps.go-env.outputs.go-arch }}
  go-cache:
    description: ""
    value: ${{ steps.go-env.outputs.go-cache }}
  go-host-arch:
    description: ""
    value: ${{ steps.go-env.outputs.go-host-arch }}
  go-host-os:
    description: ""
    value: ${{ steps.go-env.outputs.go-host-os }}
  go-mod-cache:
    description: ""
    value: ${{ steps.go-env.outputs.go-mod-cache }}
  go-os:
    description: ""
    value: ${{ steps.go-env.outputs.go-os }}
  go-path:
    description: ""
    value: ${{ steps.go-env.outputs.go-path }}
  go-proxy:
    description: ""
    value: ${{ steps.go-env.outputs.go-proxy }}
  go-root:
    description: ""
    value: ${{ steps.go-env.outputs.go-root }}
  go-tmp-dir:
    description: ""
    value: ${{ steps.go-env.outputs.go-tmp-dir }}
  go-version:
    description: ""
    value: ${{ steps.go-env.outputs.go-version }}

runs:
  using: "composite"
  steps:
    - name: Check distribution input
      shell: bash
      run: |
        distributions=("official" "microsoft")
        input="${{ inputs.distribution }}"

        echo ${distributions[@]} | grep -w -q $input
        rc=$?

        if [[ "$rc" != "0" ]]; then
          echo "Specified Go distribution is invalid: ${input}"
          exit 1
        fi

        echo "Specified Go distribution is valid: ${input}"

    # Fix slow Go compile and cache restore
    # See https://github.com/actions/setup-go/pull/515
    - name: Set Go cache environment variables (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo 'GOCACHE=D:\gocache' >> $GITHUB_ENV
        echo 'GOMODCACHE=D:\gomodcache' >> $GITHUB_ENV
        echo 'GOTMPDIR=D:\gotmp' >> $GITHUB_ENV
        mkdir -p /d/gocache
        mkdir -p /d/gomodcache
        mkdir -p /d/gotmp

    - name: Setup Go (Official distribution)
      if: inputs.distribution != 'microsoft'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.version }}
        cache: false

    - name: Setup Go (Microsoft distribution)
      if: inputs.distribution == 'microsoft'
      uses: ./.github/actions/setup-microsoft-go
      with:
        version: ${{ inputs.version }}

    - name: Set Go environment outputs
      id: go-env
      shell: bash
      run: |
        echo "go-arch=$(go env GOARCH)" >> $GITHUB_OUTPUT
        echo "go-cache=$(go env GOCACHE)" >> $GITHUB_OUTPUT
        echo "go-host-arch=$(go env GOHOSTARCH)" >> $GITHUB_OUTPUT
        echo "go-host-os=$(go env GOHOSTOS)" >> $GITHUB_OUTPUT
        echo "go-mod-cache=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        echo "go-os=$(go env GOOS)" >> $GITHUB_OUTPUT
        echo "go-path=$(go env GOPATH)" >> $GITHUB_OUTPUT
        echo "go-proxy=$(go env GOPROXY)" >> $GITHUB_OUTPUT
        echo "go-root=$(go env GOROOT)" >> $GITHUB_OUTPUT
        echo "go-tmp-dir=$(go env GOTMPDIR)" >> $GITHUB_OUTPUT
        echo "go-version=$(go env GOVERSION)" >> $GITHUB_OUTPUT
        go env

    - name: Set cache outputs
      id: go-cache-keys
      shell: bash
      env:
        BASE_KEY: go-cache
        DISTRIBUTION: ${{ inputs.distribution }}
      run: |
        distribution_key="${BASE_KEY}-${DISTRIBUTION}"
        runner_os_key="${distribution_key}-${RUNNER_OS}"
        full_key="${runner_os_key}-${{ hashFiles('**/*.sum') }}"

        echo "base=${BASE_KEY}" >> $GITHUB_OUTPUTS
        echo "distribution=${distribution_key}" >> $GITHUB_OUTPUTS
        echo "runner-os=${runner_os_key}" >> $GITHUB_OUTPUTS
        echo "full=${full_key}" >> $GITHUB_OUTPUTS

    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.go-env.outputs.go-path }}/bin
          ${{ steps.go-env.outputs.go-mod-cache }}
          ${{ steps.go-env.outputs.go-cache }}
        key: ${{ steps.go-cache-keys.outputs.full }}
        lookup-only: ${{ inputs.skip-cache-restore-on-hit == 'true' }}
        restore-keys: |
          ${{ steps.go-cache-keys.outputs.runner-os }}-

    - name: Restore Go cache if no exact cache hit
      if: inputs.skip-cache-restore-on-hit == 'true' && steps.go-cache.outputs.cache-hit != 'true'
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ steps.go-env.outputs.go-path }}/bin
          ${{ steps.go-env.outputs.go-mod-cache }}
          ${{ steps.go-env.outputs.go-cache }}
        key: ${{ steps.go-cache-keys.outputs.full }}
        restore-keys: ${{ steps.go-cache-keys.outputs.runner-os }}-
