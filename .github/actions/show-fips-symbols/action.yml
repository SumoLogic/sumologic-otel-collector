name: Show FIPS Symbols

description: |
  This action checks for FIPS-related symbols in a binary built with Go's
  native FIPS 140-3 module (GOFIPS140=v1.0.0, available since Go 1.24).

inputs:
  name:
    description: The name of the binary to check.
    required: true
  os:
    description: The operating system the binary is built for.
    required: true
  working-directory:
    description: The working directory where the binary is located.
    required: false
    default: ./

runs:
  using: "composite"
  steps:
    - name: Show native FIPS 140-3 module symbols
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        go tool nm ${{ inputs.name }} | \
        grep "crypto/internal/fips140"
